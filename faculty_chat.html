<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Students - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .student-list-item {
            background: var(--glass-bg);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-list-item:hover {
            background: rgba(38, 69, 8, 0.1);
            border-color: #264508;
            transform: translateX(5px);
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-weight: 700;
            color: #264508;
            margin-bottom: 0.3rem;
        }

        .last-message {
            font-size: 0.9rem;
            color: #264508;
            opacity: 0.7;
        }

        .unread-badge {
            background: #ff6b6b;
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header>
        <div class="brand">
            <img src="logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Faculty</span>
                <span class="role">Faculty - Computer Science</span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_dashboard.html')"><i
                    class="fas fa-home"></i>
                Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_attendance.html')"><i
                    class="fas fa-calendar-alt"></i>
                Attendance</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_timetable.html')"><i
                    class="fas fa-table"></i>
                Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_assignments.html')"><i
                    class="fas fa-tasks"></i>
                Assignments</a>
            <a href="javascript:void(0)" class="nav-item active" onclick="navigateTo('faculty_chat.html')"><i
                    class="fas fa-comments"></i> Chat with
                Students</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_marks.html')"><i
                    class="fas fa-chart-bar"></i>
                Marks &
                Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_materials.html')"><i
                    class="fas fa-book"></i>
                Upload
                Materials</a>
            <a href="index.html" class="nav-item" style="color: #ff0000;"><i
                    class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content" style="display: block; grid-template-columns: 1fr;">
            <!-- Class Selection View -->
            <div id="class-selection-view">
                <div class="marks-container">
                    <h2 style="color: #264508; margin-bottom: 2rem;">Chat with Students</h2>

                    <div class="filters">
                        <div class="filter-group">
                            <label>Select Class</label>
                            <select id="class-select" onchange="loadStudentList()">
                                <option value="">-- Choose a Class --</option>
                                <option value="CSE-2A">CSE-2A - Data Structures</option>
                                <option value="CSE-2B">CSE-2B - Algorithms</option>
                                <option value="CSE-3A">CSE-3A - Database Systems</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Student List View -->
            <div id="student-list-view" style="display: none;">
                <div class="marks-container">
                    <button onclick="backToClassSelection()"
                        style="background: #264508; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; margin-bottom: 1.5rem; font-weight: 600;">
                        <i class="fas fa-arrow-left"></i> Back to Class Selection
                    </button>

                    <h2 style="color: #264508; margin-bottom: 2rem;">Messages from <span
                            id="selected-class-name"></span></h2>

                    <div id="student-messages-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Chat Window -->
            <div id="chat-window" style="display: none;">
                <div class="marks-container">
                    <button onclick="backToStudentList()"
                        style="background: #264508; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; margin-bottom: 1.5rem; font-weight: 600;">
                        <i class="fas fa-arrow-left"></i> Back to Students
                    </button>

                    <div class="chat-interface">
                        <div class="chat-header">
                            <img src="student_profile.png" id="chat-student-img"
                                style="width:40px; height:40px; border-radius:50%;" alt="Student">
                            <div>
                                <h4 id="chat-student-name">Student Name</h4>
                                <span id="chat-student-roll"
                                    style="font-size:0.8rem; color: #264508; font-weight: 600;"></span>
                            </div>
                        </div>

                        <div class="chat-messages" id="chat-messages"></div>

                        <div class="chat-input">
                            <input type="text" id="msg-input" placeholder="Type your message..."
                                onkeypress="handleEnter(event)">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Get profile name from URL
        const urlParams = new URLSearchParams(window.location.search);
        const fullname = urlParams.get('fullname') || "Dr. Priya Singh";
        document.getElementById('profile-name').innerText = fullname;

        // Navigation helper
        function navigateTo(page) {
            window.location.href = page + '?fullname=' + encodeURIComponent(fullname);
        }

        // Sample Data - Students and their messages
        const studentMessagesData = {
            'CSE-2A': [
                {
                    roll: '21BCE0001',
                    name: 'Arjun Sharma',
                    lastMessage: 'Professor, could you please explain the concept of binary trees again?',
                    unread: 2,
                    messages: [
                        { from: 'student', text: 'Good morning, Professor!', time: '09:30 AM' },
                        { from: 'faculty', text: 'Good morning, Arjun! How can I help you?', time: '09:32 AM' },
                        { from: 'student', text: 'Could you please explain the concept of binary trees again?', time: '09:35 AM' },
                        { from: 'student', text: 'I didn\'t quite understand the traversal methods.', time: '09:36 AM' }
                    ]
                },
                {
                    roll: '21BCE0002',
                    name: 'Priya Patel',
                    lastMessage: 'Thank you for the help with the assignment!',
                    unread: 0,
                    messages: [
                        { from: 'student', text: 'Hello Professor, I have completed my assignment.', time: 'Yesterday' },
                        { from: 'faculty', text: 'Great! I\'ll review it by tomorrow.', time: 'Yesterday' },
                        { from: 'student', text: 'Thank you for the help with the assignment!', time: 'Yesterday' }
                    ]
                },
                {
                    roll: '21BCE0003',
                    name: 'Rahul Kumar',
                    lastMessage: 'When is the next class test scheduled?',
                    unread: 1,
                    messages: [
                        { from: 'student', text: 'When is the next class test scheduled?', time: '11:20 AM' }
                    ]
                },
                {
                    roll: '21BCE0005',
                    name: 'Vikram Singh',
                    lastMessage: 'Can I submit the assignment tomorrow?',
                    unread: 1,
                    messages: [
                        { from: 'student', text: 'Professor, I have a medical emergency.', time: '02:15 PM' },
                        { from: 'student', text: 'Can I submit the assignment tomorrow?', time: '02:16 PM' }
                    ]
                }
            ],
            'CSE-2B': [
                {
                    roll: '21BCE0011',
                    name: 'Rohan Gupta',
                    lastMessage: 'Could you share the lecture notes from today?',
                    unread: 1,
                    messages: [
                        { from: 'student', text: 'Good afternoon Professor!', time: '01:00 PM' },
                        { from: 'student', text: 'Could you share the lecture notes from today?', time: '01:01 PM' }
                    ]
                },
                {
                    roll: '21BCE0012',
                    name: 'Kavya Pillai',
                    lastMessage: 'Thank you for clarifying the doubts!',
                    unread: 0,
                    messages: [
                        { from: 'student', text: 'Can you explain Dijkstra\'s algorithm?', time: 'Yesterday' },
                        { from: 'faculty', text: 'Sure! It finds the shortest path...', time: 'Yesterday' },
                        { from: 'student', text: 'Thank you for clarifying the doubts!', time: 'Yesterday' }
                    ]
                },
                {
                    roll: '21BCE0015',
                    name: 'Siddharth Rao',
                    lastMessage: 'Is there any reference book you recommend?',
                    unread: 2,
                    messages: [
                        { from: 'student', text: 'Hello Professor!', time: '10:00 AM' },
                        { from: 'student', text: 'Is there any reference book you recommend?', time: '10:01 AM' }
                    ]
                }
            ],
            'CSE-3A': [
                {
                    roll: '20BCE0001',
                    name: 'Aditya Verma',
                    lastMessage: 'The SQL query assignment was interesting!',
                    unread: 0,
                    messages: [
                        { from: 'student', text: 'I completed the normalization exercise.', time: 'Yesterday' },
                        { from: 'faculty', text: 'Excellent work, Aditya!', time: 'Yesterday' },
                        { from: 'student', text: 'The SQL query assignment was interesting!', time: 'Yesterday' }
                    ]
                },
                {
                    roll: '20BCE0004',
                    name: 'Ishita Sharma',
                    lastMessage: 'Can you explain the difference between 2NF and 3NF?',
                    unread: 1,
                    messages: [
                        { from: 'student', text: 'Professor, I have a doubt about normalization.', time: '03:30 PM' },
                        { from: 'student', text: 'Can you explain the difference between 2NF and 3NF?', time: '03:31 PM' }
                    ]
                },
                {
                    roll: '20BCE0007',
                    name: 'Nikhil Desai',
                    lastMessage: 'Will attend office hours tomorrow.',
                    unread: 0,
                    messages: [
                        { from: 'student', text: 'Can I meet you during office hours?', time: 'Yesterday' },
                        { from: 'faculty', text: 'Yes, come at 4 PM tomorrow.', time: 'Yesterday' },
                        { from: 'student', text: 'Will attend office hours tomorrow.', time: 'Yesterday' }
                    ]
                }
            ]
        };

        let currentClass = '';
        let currentStudent = null;

        // Load student list for selected class
        function loadStudentList() {
            const selectedClass = document.getElementById('class-select').value;
            if (!selectedClass) return;

            currentClass = selectedClass;
            const students = studentMessagesData[selectedClass] || [];

            document.getElementById('selected-class-name').textContent = selectedClass;

            // Render student messages list
            const listHTML = students.map(student => `
                <div class="student-list-item" onclick='openStudentChat(${JSON.stringify(student).replace(/'/g, "&apos;")})'>
                    <div class="student-info">
                        <div class="student-name"><i class="fas fa-user-circle"></i> ${student.name}</div>
                        <div class="last-message">${student.lastMessage}</div>
                    </div>
                    ${student.unread > 0 ? `<div class="unread-badge">${student.unread}</div>` : ''}
                </div>
            `).join('');

            document.getElementById('student-messages-list').innerHTML = listHTML || '<p style="color: #264508; opacity: 0.7; text-align: center; padding: 2rem;">No messages from students yet.</p>';

            // Show student list view
            document.getElementById('class-selection-view').style.display = 'none';
            document.getElementById('student-list-view').style.display = 'block';
        }

        // Open chat with a student
        function openStudentChat(student) {
            currentStudent = student;

            document.getElementById('chat-student-name').textContent = student.name;
            document.getElementById('chat-student-roll').textContent = student.roll;

            // Render existing messages
            const messagesHTML = student.messages.map(msg => `
                <div class="message ${msg.from === 'student' ? 'received' : 'sent'}">
                    ${msg.text}
                    <div style="font-size: 0.75rem; opacity: 0.7; margin-top: 0.3rem;">${msg.time}</div>
                </div>
            `).join('');

            document.getElementById('chat-messages').innerHTML = messagesHTML;

            // Scroll to bottom
            setTimeout(() => {
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);

            // Show chat window
            document.getElementById('student-list-view').style.display = 'none';
            document.getElementById('chat-window').style.display = 'block';
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const messageHTML = `
                <div class="message sent">
                    ${text}
                    <div style="font-size: 0.75rem; opacity: 0.7; margin-top: 0.3rem;">${timeStr}</div>
                </div>
            `;

            document.getElementById('chat-messages').innerHTML += messageHTML;
            input.value = '';

            // Scroll to bottom
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Add to student's messages
            if (currentStudent) {
                currentStudent.messages.push({
                    from: 'faculty',
                    text: text,
                    time: timeStr
                });
            }
        }

        // Handle Enter key
        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // Back to student list
        function backToStudentList() {
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('student-list-view').style.display = 'block';
            currentStudent = null;
        }

        // Back to class selection
        function backToClassSelection() {
            document.getElementById('student-list-view').style.display = 'none';
            document.getElementById('class-selection-view').style.display = 'block';
            document.getElementById('class-select').value = '';
            currentClass = '';
        }
    </script>
</body>

</html>
