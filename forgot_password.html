<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Reset Password</h2>
            <!-- Mock Functionality without JS backend -->
            <form
                onsubmit="event.preventDefault(); alert('Temporary code sent to your email! (Simulation)'); document.getElementById('code-section').style.display='block';">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn-login">Send Code</button>
            </form>

            <form id="code-section" style="display: none; margin-top: 1.5rem;"
                onsubmit="event.preventDefault(); alert('Password Request Verified! Redirecting to setup new password...'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="code">Temporary Code</label>
                    <input type="text" id="code" name="code" placeholder="Enter received code" required>
                </div>
                <div class="form-group">
                    <label for="newpass">New Password</label>
                    <input type="password" id="newpass" name="newpass" placeholder="New 6-digit PIN" pattern="\d{6}"
                        maxlength="6" required>
                </div>
                <button type="submit" class="btn-login" style="background: #66ea8d; color: #1a5e32;">Update
                    Password</button>
            </form>

            <a href="index.html" id="backLink" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        // Dynamically set back link based on where the user came from
        const backLink = document.getElementById('backLink');
        const referrer = document.referrer;

        if (referrer.includes('faculty_login.html')) {
            backLink.href = 'faculty_login.html';
        } else {
            backLink.href = 'student_login.html';
        }
    </script>
</body>

</html>
