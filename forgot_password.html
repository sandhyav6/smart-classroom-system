<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - VIT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Forgot Password</h2>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Enter your registered email</label>
                    <input type="email" id="email" name="email" placeholder="e.g., arjun.sharma@vit.ac.in" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            <div id="reset-result" style="margin-top:1.5rem;"></div>
            <a href="index.html" class="btn-back" id="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Dynamic back link based on referrer
        const referrer = document.referrer;
        const backLink = document.getElementById('back-link');
        if (referrer.includes('student')) {
            backLink.href = 'student/student_login.html';
            backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Student Login';
        } else if (referrer.includes('faculty')) {
            backLink.href = 'faculty/faculty_login.html';
            backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Faculty Login';
        }

        document.getElementById('forgotForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();

            // Check if email exists in data
            const student = dataStore.getStudents().find(s => s.email === email);
            const faculty = dataStore.getFaculty().find(f => f.email === email);

            const resultDiv = document.getElementById('reset-result');

            if (student) {
                resultDiv.innerHTML = `
                    <div style="background:rgba(40,167,69,0.1);border:2px solid #28a745;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-check-circle" style="color:#28a745;"></i>
                        <strong>Reset link sent!</strong>
                        <p style="margin-top:0.5rem;">Email sent to ${email}</p>
                        <p style="font-size:0.85rem;opacity:0.7;margin-top:0.5rem;"><em>Demo: Your password is Pass@123</em></p>
                    </div>
                `;
                Toast.success('Password reset email sent!');
            } else if (faculty) {
                resultDiv.innerHTML = `
                    <div style="background:rgba(40,167,69,0.1);border:2px solid #28a745;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-check-circle" style="color:#28a745;"></i>
                        <strong>Reset link sent!</strong>
                        <p style="margin-top:0.5rem;">Email sent to ${email}</p>
                        <p style="font-size:0.85rem;opacity:0.7;margin-top:0.5rem;"><em>Demo: Your password is Teach@123</em></p>
                    </div>
                `;
                Toast.success('Password reset email sent!');
            } else {
                resultDiv.innerHTML = `
                    <div style="background:rgba(220,53,69,0.1);border:2px solid #dc3545;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-exclamation-circle" style="color:#dc3545;"></i>
                        <strong>Email not found</strong>
                        <p style="margin-top:0.5rem;">No account linked to ${email}</p>
                    </div>
                `;
                Toast.error('Email not found in the system');
            }
        };
    </script>
</body>
</html>
