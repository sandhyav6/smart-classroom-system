<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand">
            <img src="logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Faculty</span>
                <span class="role">Faculty - Computer Science</span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item active" onclick="navigateTo('faculty_dashboard.html')"><i
                    class="fas fa-home"></i>
                Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_attendance.html')"><i
                    class="fas fa-calendar-alt"></i>
                Attendance</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_timetable.html')"><i
                    class="fas fa-table"></i>
                Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_assignments.html')"><i
                    class="fas fa-tasks"></i>
                Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_chat.html')"><i
                    class="fas fa-comments"></i> Chat
                with
                Students</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_marks.html')"><i
                    class="fas fa-chart-bar"></i>
                Marks &
                Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_materials.html')"><i
                    class="fas fa-book"></i>
                Upload
                Materials</a>
            <a href="index.html" class="nav-item" style="color: #ff0000;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="dashboard-view">
            <!-- Central Feed / Quick Stats -->
            <div class="center-feed" style="align-self: start;">
                <h2 id="welcome-msg">Welcome back!</h2>
                <div class="selection-container">
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;"
                        onclick="navigateTo('faculty_timetable.html')">
                        <i class="fas fa-chalkboard-teacher"
                            style="font-size: 2.5rem; margin-bottom: 1rem; color: #264508;"></i>
                        <h3 id="classes-today">3</h3>
                        <p>Classes Today</p>
                    </div>
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;"
                        onclick="navigateTo('faculty_attendance_qr.html')">
                        <i class="fas fa-qrcode" style="font-size: 2.5rem; margin-bottom: 1rem; color: #264508;"></i>
                        <h3>Generate</h3>
                        <p>Attendance QR</p>
                    </div>
                </div>

                <!-- Current Date & Time -->
                <div
                    style="background: var(--glass-bg); padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; border: 2px solid var(--glass-border);">
                    <i class="fas fa-calendar-day" style="font-size: 1.5rem; color: #264508;"></i>
                    <div>
                        <div id="current-date" style="font-weight: 700; font-size: 1.1rem; color: #264508;"></div>
                        <div id="current-time" style="font-size: 0.9rem; opacity: 0.8; color: #264508;"></div>
                    </div>
                </div>

                <!-- Today's Classes -->
                <h3 style="margin-bottom: 1rem; color: #264508; cursor: pointer;"
                    onclick="navigateTo('faculty_timetable.html')">
                    <i class="fas fa-clock"></i> Today's Classes
                    <i class="fas fa-external-link-alt"
                        style="font-size: 0.8rem; margin-left: 0.5rem; opacity: 0.7;"></i>
                </h3>
                <div id="today-timetable">
                    <!-- Populated by JS -->
                </div>

            </div>

            <!-- Right Panel: To-Do / Reminders -->
            <div class="right-panel">
                <h3
                    style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.5rem;">
                    <i class="fas fa-bell"></i> Reminders & Deadlines
                </h3>

                <!-- Reminders List -->
                <div id="reminders-list" style="margin-bottom: 1rem;">
                    <!-- Populated by JS -->
                </div>

                <!-- Add New Reminder -->
                <div
                    style="background: rgba(255, 255, 255, 0.1); padding: 1rem; border-radius: 10px; border: 2px solid var(--glass-border);">
                    <h4 style="font-size: 0.95rem; margin-bottom: 0.8rem; color: #264508;"><i
                            class="fas fa-plus-circle"></i> Add Reminder</h4>
                    <input type="text" id="reminder-title" placeholder="Reminder title"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: #264508;">
                    <input type="date" id="reminder-date"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: #264508;">
                    <textarea id="reminder-desc" placeholder="Description (optional)" rows="2"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: #264508; resize: vertical;"></textarea>
                    <button onclick="addReminder()"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; background: linear-gradient(135deg, #264508, #3d6b0f); color: white; border: none; cursor: pointer; font-weight: 700; font-size: 0.9rem;">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Initialization ---
        const urlParams = new URLSearchParams(window.location.search);
        const fullname = urlParams.get('fullname') || "Dr. Priya Singh";

        document.getElementById('profile-name').innerText = fullname;
        document.getElementById('welcome-msg').innerText = "Welcome back, " + fullname.split(' ')[fullname.split(' ').length - 1] + "!";

        // Navigation helper
        function navigateTo(page) {
            window.location.href = page + '?fullname=' + encodeURIComponent(fullname);
        }

        // --- Update Date & Time ---
        function updateDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };

            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', timeOptions);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // --- Today's Classes ---
        const todayClasses = [
            { time: '09:00 - 09:50', subject: 'Data Structures', section: 'CSE-2A', room: 'AB1-201' },
            { time: '11:00 - 11:50', subject: 'Algorithms', section: 'CSE-2B', room: 'AB1-205' },
            { time: '14:00 - 14:50', subject: 'Database Systems', section: 'CSE-3A', room: 'TB-304' }
        ];

        const todayContainer = document.getElementById('today-timetable');
        if (todayClasses.length > 0) {
            todayClasses.forEach(cls => {
                todayContainer.innerHTML += `
                    <div class="event-item" style="border-left-color:#264508;">
                        <div class="event-date">${cls.time}</div>
                        <h4>${cls.subject}</h4>
                        <p style="font-size:0.9rem;opacity:0.8;">${cls.section} • <i class="fas fa-map-marker-alt"></i> ${cls.room}</p>
                    </div>
                `;
            });
        } else {
            todayContainer.innerHTML = '<p style="opacity:0.7;font-size:0.9rem;color:#264508;">No classes today</p>';
        }

        // --- Reminders / To-Do ---
        let reminders = JSON.parse(localStorage.getItem('facultyReminders')) || [
            { id: 1, title: 'Submit Final Exam Questions', date: '2026-02-05', description: 'Deadline for all faculty to submit final exam questions to the department.' },
            { id: 2, title: 'Faculty Meeting', date: '2026-02-02', description: 'Monthly faculty meeting in Conference Hall A at 10:00 AM.' },
            { id: 3, title: 'Grade Submissions', date: '2026-02-10', description: 'Submit CAT1 grades for all sections.' },
            { id: 4, title: 'Research Paper Review', date: '2026-02-08', description: 'Complete review of submitted research papers for the departmental journal.' },
            { id: 5, title: 'Curriculum Planning Meeting', date: '2026-02-15', description: 'Attend curriculum revision meeting for next academic year.' }
        ];

        // Initialize with defaults if localStorage has fewer than 5 reminders
        if (reminders.length < 5) {
            reminders = [
                { id: 1, title: 'Submit Final Exam Questions', date: '2026-02-05', description: 'Deadline for all faculty to submit final exam questions to the department.' },
                { id: 2, title: 'Faculty Meeting', date: '2026-02-02', description: 'Monthly faculty meeting in Conference Hall A at 10:00 AM.' },
                { id: 3, title: 'Grade Submissions', date: '2026-02-10', description: 'Submit CAT1 grades for all sections.' },
                { id: 4, title: 'Research Paper Review', date: '2026-02-08', description: 'Complete review of submitted research papers for the departmental journal.' },
                { id: 5, title: 'Curriculum Planning Meeting', date: '2026-02-15', description: 'Attend curriculum revision meeting for next academic year.' }
            ];
            localStorage.setItem('facultyReminders', JSON.stringify(reminders));
        }

        function renderReminders() {
            const container = document.getElementById('reminders-list');
            container.innerHTML = '';

            if (reminders.length === 0) {
                container.innerHTML = '<p style="opacity:0.7;font-size:0.9rem;color:#264508;text-align:center;padding:1rem;">No reminders yet</p>';
                return;
            }

            // Sort reminders by date
            const sortedReminders = [...reminders].sort((a, b) => new Date(a.date) - new Date(b.date));

            sortedReminders.forEach(reminder => {
                const reminderDate = new Date(reminder.date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                reminderDate.setHours(0, 0, 0, 0);

                const daysUntil = Math.ceil((reminderDate - today) / (1000 * 60 * 60 * 24));
                let statusText = '';
                let statusColor = '#264508';

                if (daysUntil < 0) {
                    statusText = 'Overdue';
                    statusColor = '#ff6b6b';
                } else if (daysUntil === 0) {
                    statusText = 'Today';
                    statusColor = '#feca57';
                } else if (daysUntil === 1) {
                    statusText = 'Tomorrow';
                    statusColor = '#F540BB';
                } else {
                    statusText = `${daysUntil} days`;
                    statusColor = '#264508';
                }

                const formattedDate = reminderDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                container.innerHTML += `
                    <div class="event-item" style="border-left-color: ${statusColor}; position: relative;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <div class="event-date" style="color: ${statusColor}; font-weight: 700;">${statusText}</div>
                                <h4 style="margin: 0.3rem 0;">${reminder.title}</h4>
                                <p style="font-size: 0.85rem; opacity: 0.8; margin: 0.3rem 0;"><i class="fas fa-calendar"></i> ${formattedDate}</p>
                                ${reminder.description ? `<p style="font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem;">${reminder.description}</p>` : ''}
                            </div>
                            <button onclick="deleteReminder(${reminder.id})" style="background: #ff6b6b; color: white; border: none; padding: 0.4rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-left: 0.5rem;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addReminder() {
            const title = document.getElementById('reminder-title').value.trim();
            const date = document.getElementById('reminder-date').value;
            const description = document.getElementById('reminder-desc').value.trim();

            if (!title || !date) {
                alert('Please enter a title and date for the reminder!');
                return;
            }

            const newId = reminders.length > 0 ? Math.max(...reminders.map(r => r.id)) + 1 : 1;
            reminders.push({
                id: newId,
                title: title,
                date: date,
                description: description
            });

            // Save to localStorage
            localStorage.setItem('facultyReminders', JSON.stringify(reminders));

            // Clear inputs
            document.getElementById('reminder-title').value = '';
            document.getElementById('reminder-date').value = '';
            document.getElementById('reminder-desc').value = '';

            renderReminders();
        }

        function deleteReminder(id) {
            if (confirm('Are you sure you want to delete this reminder?')) {
                reminders = reminders.filter(r => r.id !== id);
                localStorage.setItem('facultyReminders', JSON.stringify(reminders));
                renderReminders();
            }
        }

        // Initial render
        renderReminders();
    </script>
</body>

</html>
