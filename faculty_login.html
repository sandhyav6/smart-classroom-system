<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Faculty Login</h2>
            <form id="facultyLoginForm" action="faculty_dashboard.html" method="GET">
                <div class="form-group">
                    <label for="employeeid">Employee ID</label>
                    <input type="text" id="employeeid" name="fullname" placeholder="e.g., 12345" required maxlength="5"
                        autocomplete="off" pattern="\d{5}" title="Please enter exactly 5 digits">
                    <span id="emp-error"
                        style="color: #ff0000; font-size: 0.85rem; display: none; margin-top: 0.3rem;"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password" required
                        minlength="8" autocomplete="current-password">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; cursor: pointer;"
                        onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggle-icon" style="color: #264508;"></i>
                        <span id="toggle-text" style="font-size: 0.9rem; color: #264508; user-select: none;">Show
                            Password</span>
                    </div>
                    <span id="pwd-error"
                        style="color: #ff0000; font-size: 0.85rem; display: none; margin-top: 0.3rem;"></span>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin:0; opacity:1;">Remember me</label>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="links">
                    <a href="forgot_password.html">Forgot Password?</a>
                </div>
            </form>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('facultyLoginForm');
        const empInput = document.getElementById('employeeid');
        const pwdInput = document.getElementById('password');
        const empError = document.getElementById('emp-error');
        const pwdError = document.getElementById('pwd-error');

        // Employee ID: exactly 5 digits
        const empPattern = /^\d{5}$/;

        // Password: minimum 8 characters with at least one special character
        const pwdPattern = /^(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;

        // Real-time validation for employee ID
        empInput.addEventListener('input', function () {
            validateEmployeeId();
        });

        function validateEmployeeId() {
            const value = empInput.value;
            if (value && !empPattern.test(value)) {
                empError.textContent = 'Invalid format. Employee ID must be exactly 5 digits';
                empError.style.display = 'block';
                return false;
            } else {
                empError.style.display = 'none';
                return true;
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-icon');
            const toggleText = document.getElementById('toggle-text');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
                toggleText.textContent = 'Hide Password';
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
                toggleText.textContent = 'Show Password';
            }
        }

        function validatePassword() {
            const value = pwdInput.value;
            if (value && !pwdPattern.test(value)) {
                return false;
            } else {
                return true;
            }
        }

        // Form submission validation
        form.addEventListener('submit', function (event) {
            const empValid = validateEmployeeId();
            const pwdValid = validatePassword();

            if (!empValid || !pwdValid) {
                event.preventDefault();
                if (!empValid) {
                    empError.textContent = 'Invalid format. Employee ID must be exactly 5 digits';
                    empError.style.display = 'block';
                }
                if (!pwdValid) {
                    pwdError.textContent = 'Password must be 8+ characters with at least one special character (!@#$%^&*etc.)';
                    pwdError.style.display = 'block';
                }
                return false;
            }
        });
    </script>
</body>

</html>
