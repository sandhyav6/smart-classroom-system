<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Student Login</h2>
            <form id="studentLoginForm" action="student_dashboard.html" method="GET">
                <div class="form-group">
                    <label for="registration">Registration Number</label>
                    <input type="text" id="registration" name="fullname" placeholder="e.g., 23BCS1234" required
                        maxlength="9" autocomplete="off" style="text-transform: uppercase;">
                    <span id="reg-error"
                        style="color: #ff0000; font-size: 0.85rem; display: none; margin-top: 0.3rem;"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password" required
                        minlength="8" autocomplete="current-password">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; cursor: pointer;"
                        onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggle-icon" style="color: #264508;"></i>
                        <span id="toggle-text" style="font-size: 0.9rem; color: #264508; user-select: none;">Show
                            Password</span>
                    </div>
                    <span id="pwd-error"
                        style="color: #ff0000; font-size: 0.85rem; display: none; margin-top: 0.3rem;"></span>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin:0; opacity:1;">Remember me</label>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="links">
                    <a href="forgot_password.html">Forgot Password?</a>
                </div>
            </form>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('studentLoginForm');
        const regInput = document.getElementById('registration');
        const pwdInput = document.getElementById('password');
        const regError = document.getElementById('reg-error');
        const pwdError = document.getElementById('pwd-error');

        // Registration number format: YYAAADDDD
        // YY = 2 digits (1-9 for first digit, 0-9 for second)
        // AAA = 3 capital letters (A-Z)
        // DDDD = 4 digits (0-9)
        const regPattern = /^[1-9][0-9][A-Z]{3}[0-9]{4}$/;

        // Password: minimum 8 characters with at least one special character
        const pwdPattern = /^(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;

        // Real-time validation for registration number
        regInput.addEventListener('input', function () {
            this.value = this.value.toUpperCase();
            validateRegistration();
        });

        // Real-time validation for password
        // Password validation removed - only on form submit


        function validateRegistration() {
            const value = regInput.value;
            if (value && !regPattern.test(value)) {
                regError.textContent = 'Invalid format. Use: YYAAADDDD (e.g., 23BCS1234)';
                regError.style.display = 'block';
                return false;
            } else {
                regError.style.display = 'none';
                return true;
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-icon');
            const toggleText = document.getElementById('toggle-text');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
                toggleText.textContent = 'Hide Password';
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
                toggleText.textContent = 'Show Password';
            }
        }

        function validatePassword() {
            const value = pwdInput.value;
            if (value && !pwdPattern.test(value)) {
                return false;
            } else {
                return true;
            }
        }

        // Form submission validation
        form.addEventListener('submit', function (event) {
            const regValid = validateRegistration();
            const pwdValid = validatePassword();

            if (!regValid || !pwdValid) {
                event.preventDefault();
                if (!regValid) {
                    regError.textContent = 'Invalid format. Use: YYAAADDDD (e.g., 23BCS1234)';
                    regError.style.display = 'block';
                }
                if (!pwdValid) {
                    pwdError.textContent = 'Password must be 8+ characters with at least one special character (!@#$%^&*etc.)';
                    pwdError.style.display = 'block';
                }
                return false;
            }
        });
    </script>
</body>

</html>
