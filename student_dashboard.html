<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand">
            <img src="logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Student</span>
                <span class="role">CSE - B.Tech | CGPA: <span id="cgpa-display">0.0</span></span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="student_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="#" class="nav-item active" onclick="navigateTo('student_dashboard.html')"><i
                    class="fas fa-home"></i>
                Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_attendance.html')"><i
                    class="fas fa-calendar-alt"></i>
                Attendance Record</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_timetable.html')"><i
                    class="fas fa-table"></i>
                Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_assignments.html')"><i
                    class="fas fa-tasks"></i>
                Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_chat.html')"><i
                    class="fas fa-comments"></i> Chat
                with
                Teachers</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_marks.html')"><i
                    class="fas fa-chart-bar"></i>
                Marks &
                Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('student_materials.html')"><i
                    class="fas fa-book"></i>
                Study
                Materials</a>
            <a href="index.html" class="nav-item" style="color: #ff0000;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="dashboard-view">
            <!-- Central Feed / Quick Stats -->
            <div class="center-feed">
                <h2 id="welcome-msg">Welcome back!</h2>
                <div class="selection-container">
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;"
                        onclick="toggleAttendance()">
                        <i class="fas fa-user-check" style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
                        <h3 id="attendance-display">85%</h3>
                        <p>Attendance</p>
                    </div>
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;" onclick="openQRScanner()">
                        <i class="fas fa-qrcode" style="font-size: 2.5rem; margin-bottom: 1rem; color: #264508;"></i>
                        <h3>Scan QR</h3>
                        <p>Attendance Scanner</p>
                    </div>
                </div>

                <!-- Current Date & Time -->
                <div
                    style="background: var(--glass-bg); padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; border: 2px solid var(--glass-border);">
                    <i class="fas fa-calendar-day" style="font-size: 1.5rem; color: #264508;"></i>
                    <div>
                        <div id="current-date" style="font-weight: 700; font-size: 1.1rem; color: #264508;"></div>
                        <div id="current-time" style="font-size: 0.9rem; opacity: 0.8; color: #264508;"></div>
                    </div>
                </div>

                <!-- Today's Timetable -->
                <h3 style="margin-bottom: 1rem; color: #264508; cursor: pointer;"
                    onclick="navigateTo('student_timetable.html')">
                    <i class="fas fa-clock"></i> Today's Classes
                    <i class="fas fa-external-link-alt"
                        style="font-size: 0.8rem; margin-left: 0.5rem; opacity: 0.7;"></i>
                </h3>
                <div id="today-timetable">
                    <!-- Populated by JS -->
                </div>

            </div>

            <!-- Right Panel: Submissions Due -->
            <div class="right-panel">
                <h3
                    style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.5rem;">
                    Submissions due</h3>
                <div id="upcoming-assignments">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Backend Logic -->
    <script src="backend.js"></script>

    <script>
        // --- Initialization ---
        const urlParams = new URLSearchParams(window.location.search);
        const fullname = urlParams.get('fullname') || "Arjun Sharma";
        const studentData = Backend.getStudent(fullname);

        document.getElementById('profile-name').innerText = fullname;
        document.getElementById('welcome-msg').innerText = "Welcome back, " + fullname.split(' ')[0] + "!";
        document.getElementById('cgpa-display').innerText = studentData.cgpa;

        // Navigation helper
        function navigateTo(page) {
            window.location.href = page + '?fullname=' + encodeURIComponent(fullname);
        }


        // --- Attendance Toggle ---
        let attendanceTimeout = null;
        const totalClasses = 65;
        const classesAttended = 55;
        const attendancePercentage = Math.round((classesAttended / totalClasses) * 100); // 85%

        function toggleAttendance() {
            const display = document.getElementById('attendance-display');

            // Clear any existing timeout
            if (attendanceTimeout) {
                clearTimeout(attendanceTimeout);
            }

            // Show fraction
            display.textContent = `${classesAttended}/${totalClasses}`;

            // Revert to percentage after 2 seconds
            attendanceTimeout = setTimeout(() => {
                display.textContent = `${attendancePercentage}%`;
            }, 2000);
        }

        // --- QR Scanner Function ---
        function openQRScanner() {
            // Check if device is mobile
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (isMobile) {
                // For mobile device, open QR scanner (in a real app, this would launch the camera)
                alert('QR Scanner would open here on mobile app.\n\nThis would use your device camera to scan QR codes for attendance marking.');
                // In production: window.location.href = 'qr-scanner.html' or native camera API
            } else {
                // For desktop/laptop
                alert('Please use mobile device\n\nQR code scanning is only available on mobile devices with camera access.');
            }
        }

        // --- Update Date & Time ---
        function updateDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };

            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', timeOptions);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // --- Timetable Data ---
        const timetableData = {
            'Semester 1': {
                schedule: {
                    '09:00 - 09:50': { Mon: { code: 'CSE101', name: 'Programming in C', location: 'AB1-201' }, Tue: null, Wed: { code: 'CSE101', name: 'Programming in C', location: 'AB1-201' }, Thu: null, Fri: { code: 'CSE101', name: 'Programming in C', location: 'AB1-201' } },
                    '10:00 - 10:50': { Mon: { code: 'MAT101', name: 'Calculus', location: 'AB2-105' }, Tue: { code: 'MAT101', name: 'Calculus', location: 'AB2-105' }, Wed: null, Thu: { code: 'MAT101', name: 'Calculus', location: 'AB2-105' }, Fri: null },
                    '11:00 - 11:50': { Mon: { code: 'PHY101', name: 'Physics', location: 'TB-304' }, Tue: null, Wed: { code: 'PHY101', name: 'Physics', location: 'TB-304' }, Thu: { code: 'PHY101', name: 'Physics', location: 'TB-304' }, Fri: null },
                    '13:00 - 13:50': { Mon: null, Tue: { code: 'CSE101L', name: 'C Lab', location: 'Lab-105' }, Wed: null, Thu: { code: 'PHY101L', name: 'Physics Lab', location: 'Lab-201' }, Fri: null },
                    '14:00 - 14:50': { Mon: { code: 'ENG101', name: 'English', location: 'MB-102' }, Tue: null, Wed: { code: 'ENG101', name: 'English', location: 'MB-102' }, Thu: null, Fri: { code: 'ENG101', name: 'English', location: 'MB-102' } },
                    '15:00 - 15:50': { Mon: null, Tue: { code: 'CSE101L', name: 'C Lab', location: 'Lab-105' }, Wed: null, Thu: { code: 'PHY101L', name: 'Physics Lab', location: 'Lab-201' }, Fri: null }
                }
            }
        };

        // --- Render Today's Timetable ---
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const todayCode = days[new Date().getDay()];
        const todayContainer = document.getElementById('today-timetable');
        const schedule = timetableData['Semester 1'].schedule;

        if (todayCode === 'Sun' || todayCode === 'Sat') {
            todayContainer.innerHTML = '<p style="opacity:0.7;font-size:0.9rem;color:#264508;">No classes today (Weekend)</p>';
        } else {
            let classesHTML = '';
            let hasClasses = false;
            Object.entries(schedule).forEach(([time, slots]) => {
                const classInfo = slots[todayCode];
                if (classInfo) {
                    hasClasses = true;
                    classesHTML += `
                        <div class="event-item" style="border-left-color:#264508;">
                            <div class="event-date">${time}</div>
                            <h4>${classInfo.name}</h4>
                            <p style="font-size:0.9rem;opacity:0.8;">${classInfo.code} • <i class="fas fa-map-marker-alt"></i> ${classInfo.location}</p>
                        </div>
                    `;
                }
            });
            todayContainer.innerHTML = hasClasses ? classesHTML : '<p style="opacity:0.7;font-size:0.9rem;color:#264508;">No classes scheduled</p>';
        }

        // --- Assignments Data (same as student_assignments.html) ---
        const assignmentsData = [
            { id: 1, title: 'Binary Search Tree Implementation', course: 'Data Structures', courseCode: 'CSE201', dueDate: '2026-02-05' },
            { id: 2, title: 'Linear Algebra Problem Set', course: 'Linear Algebra', courseCode: 'MAT201', dueDate: '2026-02-08' },
            { id: 3, title: 'Digital Logic Circuit Design', course: 'Digital Logic Design', courseCode: 'CSE202', dueDate: '2026-02-10' },
            { id: 4, title: 'Ethics Case Study Analysis', course: 'Ethics and Values', courseCode: 'HUM201', dueDate: '2026-02-12' },
            { id: 5, title: 'Programming Assignment 3', course: 'Programming in C', courseCode: 'CSE101', dueDate: '2026-01-28' },
            { id: 6, title: 'Calculus Integration Problems', course: 'Calculus', courseCode: 'MAT101', dueDate: '2026-01-25' }
        ];

        // Render Upcoming Assignments (sorted by due date)
        const upcomingContainer = document.getElementById('upcoming-assignments');
        const today = new Date();

        // Get all upcoming assignments and sort by due date
        const upcomingAssignments = assignmentsData
            .filter(assignment => {
                const dueDate = new Date(assignment.dueDate);
                return dueDate >= today;
            })
            .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

        if (upcomingAssignments.length === 0) {
            upcomingContainer.innerHTML = '<p style="opacity: 0.7; font-size: 0.9rem;">No upcoming submissions</p>';
        } else {
            upcomingAssignments.forEach(assignment => {
                const dueDate = new Date(assignment.dueDate);
                const options = { month: 'short', day: 'numeric', year: 'numeric' };
                const formattedDate = dueDate.toLocaleDateString('en-US', options);

                upcomingContainer.innerHTML += `
                    <div class="event-item" onclick="navigateToAssignment(${assignment.id})" style="cursor: pointer; transition: all 0.3s ease;">
                        <div class="event-date">${formattedDate}</div>
                        <h4>${assignment.title}</h4>
                        <p style="font-size: 0.9rem; opacity: 0.8;">${assignment.course}</p>
                    </div>
                `;
            });
        }

        // Navigate to assignment detail
        function navigateToAssignment(assignmentId) {
            window.location.href = `student_assignments.html?fullname=${encodeURIComponent(fullname)}&assignmentId=${assignmentId}`;
        }


    </script>
</body>

</html>
