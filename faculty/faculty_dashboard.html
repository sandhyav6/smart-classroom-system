<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand">
            <img src="../assets/logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Faculty</span>
                <span class="role">Faculty - Computer Science</span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="../assets/faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="#" class="nav-item active" data-page="dashboard" onclick="Nav.to('faculty_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" data-page="attendance" onclick="Nav.to('faculty_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance</a>
            <a href="javascript:void(0)" class="nav-item" data-page="timetable" onclick="Nav.to('faculty_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" data-page="assignments" onclick="Nav.to('faculty_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="javascript:void(0)" class="nav-item" data-page="chat" onclick="Nav.to('faculty_chat.html')"><i class="fas fa-comments"></i> Chat with Students</a>
            <a href="javascript:void(0)" class="nav-item" data-page="marks" onclick="Nav.to('faculty_marks.html')"><i class="fas fa-chart-bar"></i> Marks & Results</a>
            <a href="javascript:void(0)" class="nav-item" data-page="materials" onclick="Nav.to('faculty_materials.html')"><i class="fas fa-book"></i> Upload Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="dashboard-view">
            <!-- Central Feed / Quick Stats -->
            <div class="center-feed" style="align-self: start;">
                <h2 id="welcome-msg">Welcome back!</h2>
                <div class="selection-container">
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;" onclick="Nav.to('faculty_timetable.html')">
                        <i class="fas fa-chalkboard-teacher" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-color);"></i>
                        <h3 id="classes-today">3</h3>
                        <p>Classes Today</p>
                    </div>
                    <div class="card" style="width: 250px; padding: 2rem; cursor: pointer;" onclick="Nav.to('faculty_attendance_qr.html')">
                        <i class="fas fa-qrcode" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-color);"></i>
                        <h3>Generate</h3>
                        <p>Attendance QR</p>
                    </div>
                </div>

                <!-- Current Date & Time -->
                <div style="background: var(--glass-bg); padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; border: 2px solid var(--glass-border);">
                    <i class="fas fa-calendar-day" style="font-size: 1.5rem; color: var(--text-color);"></i>
                    <div>
                        <div id="current-date" style="font-weight: 700; font-size: 1.1rem;"></div>
                        <div id="current-time" style="font-size: 0.9rem; opacity: 0.8;"></div>
                    </div>
                </div>

                <!-- Today's Classes -->
                <h3 style="margin-bottom: 1rem; cursor: pointer;" onclick="Nav.to('faculty_timetable.html')">
                    <i class="fas fa-clock"></i> Today's Classes
                    <i class="fas fa-external-link-alt" style="font-size: 0.8rem; margin-left: 0.5rem; opacity: 0.7;"></i>
                </h3>
                <div id="today-timetable"></div>
            </div>

            <!-- Right Panel: Reminders -->
            <div class="right-panel">
                <h3 style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.5rem;">
                    <i class="fas fa-bell"></i> Reminders & Deadlines
                </h3>

                <div id="reminders-list" style="margin-bottom: 1rem;"></div>

                <!-- Add New Reminder -->
                <div style="background: rgba(255, 255, 255, 0.1); padding: 1rem; border-radius: 10px; border: 2px solid var(--glass-border);">
                    <h4 style="font-size: 0.95rem; margin-bottom: 0.8rem;"><i class="fas fa-plus-circle"></i> Add Reminder</h4>
                    <input type="text" id="reminder-title" placeholder="Reminder title"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-color);">
                    <input type="date" id="reminder-date"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-color);">
                    <textarea id="reminder-desc" placeholder="Description (optional)" rows="2"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 2px solid var(--glass-border); background: var(--glass-bg); margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-color); resize: vertical;"></textarea>
                    <button onclick="Dashboard.addReminder()"
                        style="width: 100%; padding: 0.6rem; border-radius: 6px; background: linear-gradient(135deg, #264508, #3d6b0f); color: white; border: none; cursor: pointer; font-weight: 700; font-size: 0.9rem;">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Core JS -->
    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/dashboard.js"></script>

    <script>
        Dashboard.init('faculty');
    </script>
</body>

</html>
