<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - VIT</title>
    <meta name="description" content="Faculty login portal for VIT Smart Classroom System">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Faculty Login</h2>
            <form id="facultyLoginForm">
                <div class="form-group">
                    <label for="employeeid">Employee ID</label>
                    <input type="text" id="employeeid" name="fullname" placeholder="e.g., 10001" required maxlength="5"
                        autocomplete="off" pattern="\d{5}" title="Enter exactly 5 digits">
                    <span id="emp-error"
                        style="color: #ff6b6b; font-size: 0.85rem; display: none; margin-top: 0.3rem;"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password" required
                        minlength="6" autocomplete="current-password">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; cursor: pointer;"
                        onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggle-icon" style="color: var(--text-color);"></i>
                        <span id="toggle-text" style="font-size: 0.9rem; color: var(--text-color); user-select: none;">Show
                            Password</span>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin:0; opacity:1;">Remember me</label>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="links">
                    <a href="../forgot_password.html">Forgot Password?</a>
                </div>
            </form>

            <!-- Demo credentials -->
            <div class="demo-banner" onclick="LoginManager.showCredentials('faculty')">
                <i class="fas fa-info-circle"></i> Click to see sample login credentials
            </div>

            <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <!-- Core JS -->
    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/login.js"></script>

    <script>
        const form = document.getElementById('facultyLoginForm');

        // Toggle password
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            const text = document.getElementById('toggle-text');

            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
                text.textContent = 'Hide Password';
            } else {
                pwdInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
                text.textContent = 'Show Password';
            }
        }

        // Handle form submission with login.js
        form.addEventListener('submit', (e) => LoginManager.handleFacultyLogin(e));
    </script>
</body>

</html>
