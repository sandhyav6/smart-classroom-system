<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks & Results - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand">
            <img src="../assets/logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Student</span>
                <span class="role">CSE - B.Tech | CGPA: <span id="cgpa-display">0.0</span></span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="../assets/student_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance Record</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_chat.html')"><i class="fas fa-comments"></i> Chat with Teachers</a>
            <a href="#" class="nav-item active"><i class="fas fa-chart-bar"></i> Marks & Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_materials.html')"><i class="fas fa-book"></i> Study Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Marks & Results View -->
        <main class="main-content" style="display: block; grid-template-columns: 1fr;">
            <div class="marks-container">
                <h2>Marks & Results</h2>

                <!-- Search -->
                <div class="search-bar-wrapper" style="margin: 1rem 0;">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search by subject name..." id="marks-search">
                </div>

                <div class="filters">
                    <div class="filter-group">
                        <label>Select Semester</label>
                        <select id="sem-select"></select>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Subject</th>
                                <th>DA1</th>
                                <th>DA2</th>
                                <th>DA3</th>
                                <th>CAT1</th>
                                <th>CAT2</th>
                                <th>FAT</th>
                                <th>Total</th>
                                <th>Grade</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="marks-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>

    <script>
        // Initialize
        const session = Session.requireAuth('student');
        if (session) {
            UIHelpers.populateHeader(session);

            const student = dataStore.getStudentById(session.id);

            // Populate semester selector
            const semSelect = document.getElementById('sem-select');
            for (let i = 1; i <= 8; i++) {
                const opt = document.createElement('option');
                opt.value = `Semester ${i}`;
                opt.textContent = `Semester ${i}`;
                if (student && i === student.semester) opt.selected = true;
                semSelect.appendChild(opt);
            }
            semSelect.onchange = () => renderMarks();

            function renderMarks(filter = '') {
                const sem = semSelect.value;
                const tbody = document.getElementById('marks-body');
                tbody.innerHTML = '';

                let marks = dataStore.getMarks(session.id, sem);
                if (filter) {
                    marks = marks.filter(m =>
                        m.name.toLowerCase().includes(filter.toLowerCase()) ||
                        m.code.toLowerCase().includes(filter.toLowerCase())
                    );
                }

                if (marks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">No records found.</td></tr>';
                    return;
                }

                marks.forEach(m => {
                    const statusClass = (m.grade === 'F' || m.grade === 'N') ? 'status-fail' : '';
                    tbody.innerHTML += `
                        <tr class="animate-in">
                            <td>${m.code}</td>
                            <td style="font-weight:600;">${m.name}</td>
                            <td>${m.da1}</td>
                            <td>${m.da2}</td>
                            <td>${m.da3}</td>
                            <td>${m.cat1}</td>
                            <td>${m.cat2}</td>
                            <td>${m.fat}</td>
                            <td class="${statusClass}">${m.total}</td>
                            <td class="${statusClass}" style="font-weight:bold;">${m.grade}</td>
                            <td class="${statusClass}">${m.remarks}</td>
                        </tr>
                    `;
                });
            }

            // Live search
            const searchInput = document.getElementById('marks-search');
            searchInput.addEventListener('input', SearchUtils.debounce(e => renderMarks(e.target.value), 250));

            renderMarks();
        }
    </script>
</body>

</html>
