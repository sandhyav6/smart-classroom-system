<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Teachers - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand"><img src="../assets/logo.png" alt="VIT Logo"><h1>Vellore Institute of Technology</h1></div>
        <div class="profile-section">
            <div class="profile-info"><span class="name" id="profile-name">Student</span><span class="role">CSE - B.Tech | CGPA: <span id="cgpa-display">0.0</span></span></div>
            <img src="../assets/student_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>
    <div class="dashboard-container">
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance Record</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="#" class="nav-item active"><i class="fas fa-comments"></i> Chat with Teachers</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_marks.html')"><i class="fas fa-chart-bar"></i> Marks & Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_materials.html')"><i class="fas fa-book"></i> Study Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <main class="main-content" style="display: block;">
            <div class="marks-container">
                <div id="teacher-list-view">
                    <h2><i class="fas fa-comments"></i> Chat with Teachers</h2>
                    <p style="margin-bottom:1.5rem;opacity:0.8;">Select a teacher to start chatting</p>
                    <div class="search-bar-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" placeholder="Search teachers..." id="teacher-search">
                    </div>
                    <div class="teacher-grid" id="teacher-grid"></div>
                </div>
                <div id="chat-view" class="hidden">
                    <button onclick="backToTeachers()" style="background:var(--text-color, #264508); color:white; border:none; padding:0.8rem 1.5rem; border-radius:10px; cursor:pointer; margin-bottom:1rem; font-weight:600;">
                        <i class="fas fa-arrow-left"></i> Back to Teachers
                    </button>
                    <div class="chat-interface">
                        <div class="chat-header">
                            <img src="../assets/faculty_profile.png" alt="Teacher" style="width:40px;height:40px;border-radius:50%;">
                            <div><strong id="chat-teacher-name"></strong><br><small style="opacity:0.7;" id="chat-teacher-subject"></small></div>
                            <div class="status-dot online" style="position:static;margin-left:auto;"></div>
                        </div>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input">
                            <input type="text" id="chat-msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script>
    (async () => {
        await dataStore.ready();
        const session = await Session.requireAuth('student');
        if (!session) return;

        UIHelpers.populateHeader(session);
        const faculty = dataStore.getFaculty();
        // Compute online status once so it doesn't flicker on every render
        const onlineStatus = Object.fromEntries(faculty.map(f => [f.id, Math.random() > 0.5]));
        let currentTeacher  = null;
        let pollTimer       = null;   // setInterval handle
        let lastTimestamp   = null;   // ISO string of newest msg we've rendered
        let renderedCount   = 0;

        const CHAT_API = '/api/chat';

        // ── Teacher grid ───────────────────────────────────────────────
        function renderTeachers(filter = '') {
            const grid = document.getElementById('teacher-grid');
            const filtered = filter
                ? faculty.filter(f => f.name.toLowerCase().includes(filter.toLowerCase()) ||
                                      f.subjects.some(s => s.toLowerCase().includes(filter.toLowerCase())))
                : faculty;

            grid.innerHTML = filtered.map(f => {
                const online = onlineStatus[f.id];
                return `<div class="teacher-card" onclick="openChat('${f.id}')">`  +
                    `<div class="status-dot ${online ? 'online' : ''}"></div>` +
                    `<img src="../assets/faculty_profile.png" alt="${f.name}">` +
                    `<h4 style="color:var(--text-color);margin-bottom:0.3rem;">${f.name}</h4>` +
                    `<p style="font-size:0.85rem;opacity:0.8;color:var(--text-color);">${f.subjects[0]}</p>` +
                `</div>`;
            }).join('');
        }

        renderTeachers();
        document.getElementById('teacher-search').oninput =
            SearchUtils.debounce(e => renderTeachers(e.target.value), 250);

        // ── Message DOM helpers ──────────────────────────────────────────
        function appendMessages(msgs) {
            if (!msgs.length) return;
            const container = document.getElementById('chat-messages');
            const wasAtBottom =
                container.scrollHeight - container.clientHeight - container.scrollTop < 60;

            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `message ${m.from === 'student' ? 'sent' : 'received'}`;
                div.textContent = m.text;
                container.appendChild(div);
            });

            renderedCount += msgs.length;
            lastTimestamp  = msgs[msgs.length - 1].timestamp;
            if (wasAtBottom) container.scrollTop = container.scrollHeight;
        }

        function clearMessages() {
            document.getElementById('chat-messages').innerHTML = '';
            renderedCount  = 0;
            lastTimestamp  = null;
        }

        // ── Polling — fetch only NEW messages since lastTimestamp ───────────
        function stopPolling() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        async function pollMessages() {
            if (!currentTeacher) return;
            const chatKey = `${session.id}_${currentTeacher.id}`;
            const url     = lastTimestamp
                ? `${CHAT_API}/${chatKey}?after=${encodeURIComponent(lastTimestamp)}`
                : `${CHAT_API}/${chatKey}`;
            try {
                const res  = await fetch(url);
                if (!res.ok) return;
                const msgs = await res.json();
                if (msgs.length) appendMessages(msgs);
            } catch { /* network blip — silently ignore */ }
        }

        function startPolling() {
            stopPolling();
            pollMessages();                          // immediate first fetch
            pollTimer = setInterval(pollMessages, 3000);
        }

        // ── Open conversation ──────────────────────────────────────────────
        window.openChat = async function(facultyId) {
            currentTeacher = dataStore.getFacultyById(facultyId);
            if (!currentTeacher) return;

            document.getElementById('teacher-list-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-teacher-name').textContent    = currentTeacher.name;
            document.getElementById('chat-teacher-subject').textContent = currentTeacher.subjects.join(', ');

            clearMessages();
            startPolling();   // loads history + begins 3s polling
        };

        // ── Send message ───────────────────────────────────────────────────
        window.sendMessage = async function() {
            const input = document.getElementById('chat-msg-input');
            const text  = input.value.trim();
            if (!text || !currentTeacher) return;

            const chatKey = `${session.id}_${currentTeacher.id}`;
            input.value   = '';
            input.disabled = true;

            try {
                const res = await fetch(`${CHAT_API}/${chatKey}`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ from: 'student', text })
                });
                if (res.ok) {
                    const msg = await res.json();
                    appendMessages([msg]);   // show immediately without waiting for poll
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Failed to send: ' + (err.error || 'Unknown error'));
                    input.value = text;  // restore input on error
                }
            } catch {
                alert('Cannot reach server. Is it running on localhost:3000?');
                input.value = text;
            }
            input.disabled = false;
            input.focus();
        };

        // ── Back button ──────────────────────────────────────────────────
        window.backToTeachers = function() {
            stopPolling();
            document.getElementById('chat-view').classList.add('hidden');
            document.getElementById('teacher-list-view').classList.remove('hidden');
            currentTeacher = null;
            clearMessages();
        };
    })();
    </script>
</body>
</html>
