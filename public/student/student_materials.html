<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Materials - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand"><img src="../assets/logo.png" alt="VIT Logo"><h1>Vellore Institute of Technology</h1></div>
        <div class="profile-section">
            <div class="profile-info"><span class="name" id="profile-name">Student</span><span class="role">CSE - B.Tech | CGPA: <span id="cgpa-display">0.0</span></span></div>
            <img src="../assets/student_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>
    <div class="dashboard-container">
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance Record</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_chat.html')"><i class="fas fa-comments"></i> Chat with Teachers</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('student_marks.html')"><i class="fas fa-chart-bar"></i> Marks & Results</a>
            <a href="#" class="nav-item active"><i class="fas fa-book"></i> Study Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <main class="main-content" style="display: block;">
            <div class="marks-container">
                <h2><i class="fas fa-book"></i> Study Materials</h2>
                <div class="filters" style="gap:1rem;">
                    <div class="filter-group">
                        <label>Semester</label>
                        <select id="mat-sem-select" onchange="loadSubjects()"></select>
                    </div>
                    <div class="filter-group">
                        <label>Subject</label>
                        <select id="mat-sub-select" onchange="loadModules()">
                            <option value="">-- Select Subject --</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Module</label>
                        <select id="mat-mod-select" onchange="loadFiles()">
                            <option value="">-- Select Module --</option>
                        </select>
                    </div>
                </div>
                <div id="materials-list" style="margin-top:2rem;"></div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (async () => {
            await dataStore.ready();
            const session = await Session.requireAuth('student');
            if (!session) return;

            UIHelpers.populateHeader(session);
            const student = dataStore.getStudentById(session.id);

            const semSelect = document.getElementById('mat-sem-select');
            for (let i = 1; i <= 8; i++) {
                const opt = document.createElement('option');
                opt.value = `Semester ${i}`;
                opt.textContent = `Semester ${i}`;
                if (student && i === student.semester) opt.selected = true;
                semSelect.appendChild(opt);
            }

            window.loadSubjects = async function() {
                const sem = semSelect.value;
                const subSelect = document.getElementById('mat-sub-select');
                subSelect.innerHTML = '<option value="">-- Select Subject --</option>';
                document.getElementById('mat-mod-select').innerHTML = '<option value="">-- Select Module --</option>';
                document.getElementById('materials-list').innerHTML = '';

                const subjects = await dataStore.getMaterials(sem);
                subjects.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub;
                    opt.textContent = sub;
                    subSelect.appendChild(opt);
                });
            };

            window.loadModules = async function() {
                const sem = semSelect.value;
                const sub = document.getElementById('mat-sub-select').value;
                const modSelect = document.getElementById('mat-mod-select');
                modSelect.innerHTML = '<option value="">-- Select Module --</option>';
                document.getElementById('materials-list').innerHTML = '';

                if (!sub) return;
                const modules = await dataStore.getMaterials(sem, sub);
                modules.forEach(mod => {
                    const opt = document.createElement('option');
                    opt.value = mod;
                    opt.textContent = mod;
                    modSelect.appendChild(opt);
                });
            };

            window.loadFiles = async function() {
                const sem = semSelect.value;
                const sub = document.getElementById('mat-sub-select').value;
                const mod = document.getElementById('mat-mod-select').value;
                const container = document.getElementById('materials-list');

                if (!mod) { container.innerHTML = ''; return; }

                const files = await dataStore.getMaterials(sem, sub, mod);
                const icons = { pdf: 'fa-file-pdf', docx: 'fa-file-word', pptx: 'fa-file-powerpoint' };
                const colors = { pdf: '#dc3545', docx: '#0d6efd', pptx: '#fd7e14' };

                container.innerHTML = files.length === 0
                    ? '<p style="opacity:0.7;">No materials found</p>'
                    : files.map(f => {
                        const downloadAction = f.placeholder
                            ? `Toast.info('Placeholder: ${f.name}')`
                            : `window.open('/api/materials/download/${f._id}', '_blank')`;
                        return `
                            <div class="class-detail-card" style="display:flex;align-items:center;gap:1rem;cursor:pointer;" onclick="${downloadAction}">
                                <i class="fas ${icons[f.type] || 'fa-file'}" style="font-size:2rem;color:${colors[f.type] || 'var(--text-color)'};"></i>
                                <div>
                                    <h4 style="margin:0;font-size:1rem;">${f.name}</h4>
                                    <p style="font-size:0.85rem;opacity:0.7;margin:0;">${(f.type || '').toUpperCase()} • ${mod}</p>
                                </div>
                                <i class="fas fa-download" style="margin-left:auto;opacity:0.5;"></i>
                            </div>
                        `;
                    }).join('');
            };

            await loadSubjects();
        })();
    </script>
</body>
</html>
