<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Students - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand"><img src="../assets/logo.png" alt="VIT Logo"><h1>Vellore Institute of Technology</h1></div>
        <div class="profile-section">
            <div class="profile-info"><span class="name" id="profile-name">Faculty</span><span class="role">Faculty - Computer Science</span></div>
            <img src="../assets/faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>
    <div class="dashboard-container">
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="#" class="nav-item active"><i class="fas fa-comments"></i> Chat with Students</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_marks.html')"><i class="fas fa-chart-bar"></i> Marks &amp; Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_materials.html')"><i class="fas fa-book"></i> Upload Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <main class="main-content" style="display: block;">
            <div class="marks-container">
                <div id="student-list-view">
                    <h2><i class="fas fa-comments"></i> Chat with Students</h2>
                    <p style="margin-bottom:1.5rem;opacity:0.8;">Select a student to start chatting</p>
                    <div class="search-bar-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" placeholder="Search students..." id="student-search">
                    </div>
                    <div class="teacher-grid" id="student-grid"></div>
                </div>
                <div id="chat-view" class="hidden">
                    <button onclick="backToStudents()" style="background:var(--text-color, #264508); color:white; border:none; padding:0.8rem 1.5rem; border-radius:10px; cursor:pointer; margin-bottom:1rem; font-weight:600;">
                        <i class="fas fa-arrow-left"></i> Back to Students
                    </button>
                    <div class="chat-interface">
                        <div class="chat-header">
                            <img src="../assets/student_profile.png" alt="Student" style="width:40px;height:40px;border-radius:50%;">
                            <div><strong id="chat-student-name"></strong><br><small style="opacity:0.7;" id="chat-student-id"></small></div>
                            <div class="status-dot online" style="position:static;margin-left:auto;"></div>
                        </div>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input">
                            <input type="text" id="chat-msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script>
    (async () => {
        await dataStore.ready();
        const session = await Session.requireAuth('faculty');
        if (!session) return;

        UIHelpers.populateHeader(session);
        const students = dataStore.getStudents().slice(0, 30);
        let currentStudent = null;
        let pollTimer      = null;
        let lastTimestamp  = null;
        let renderedCount  = 0;

        const CHAT_API = '/api/chat';

        // ── Student grid ───────────────────────────────────────────────
        function renderStudents(filter = '') {
            const grid = document.getElementById('student-grid');
            const filtered = filter
                ? students.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()) ||
                                       s.id.toLowerCase().includes(filter.toLowerCase()))
                : students;

            grid.innerHTML = filtered.map(s => {
                const online = Math.random() > 0.4;
                return `<div class="teacher-card" onclick="openChat('${s.id}')">` +
                    `<div class="status-dot ${online ? 'online' : ''}"></div>` +
                    `<img src="../assets/student_profile.png" alt="${s.name}">` +
                    `<h4 style="color:var(--text-color);margin-bottom:0.3rem;">${s.name}</h4>` +
                    `<p style="font-size:0.85rem;opacity:0.8;color:var(--text-color);">${s.id} • ${s.department}</p>` +
                `</div>`;
            }).join('');
        }

        renderStudents();
        document.getElementById('student-search').oninput =
            SearchUtils.debounce(e => renderStudents(e.target.value), 250);

        // ── Message DOM helpers ────────────────────────────────────────
        function appendMessages(msgs) {
            if (!msgs.length) return;
            const container = document.getElementById('chat-messages');
            const wasAtBottom =
                container.scrollHeight - container.clientHeight - container.scrollTop < 60;

            msgs.forEach(m => {
                const div = document.createElement('div');
                // Faculty is 'teacher' — their sent messages are "from: teacher"
                div.className = `message ${m.from === 'teacher' ? 'sent' : 'received'}`;
                div.textContent = m.text;
                container.appendChild(div);
            });

            renderedCount += msgs.length;
            lastTimestamp  = msgs[msgs.length - 1].timestamp;
            if (wasAtBottom) container.scrollTop = container.scrollHeight;
        }

        function clearMessages() {
            document.getElementById('chat-messages').innerHTML = '';
            renderedCount = 0;
            lastTimestamp = null;
        }

        // ── Polling ────────────────────────────────────────────────────
        function stopPolling() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        async function pollMessages() {
            if (!currentStudent) return;
            const chatKey = `${currentStudent.id}_${session.id}`;
            const url     = lastTimestamp
                ? `${CHAT_API}/${chatKey}?after=${encodeURIComponent(lastTimestamp)}`
                : `${CHAT_API}/${chatKey}`;
            try {
                const res  = await fetch(url);
                if (!res.ok) return;
                const msgs = await res.json();
                if (msgs.length) appendMessages(msgs);
            } catch { /* silently ignore network blips */ }
        }

        function startPolling() {
            stopPolling();
            pollMessages();
            pollTimer = setInterval(pollMessages, 3000);
        }

        // ── Open conversation ──────────────────────────────────────────
        window.openChat = async function(studentId) {
            currentStudent = dataStore.getStudentById(studentId);
            if (!currentStudent) return;

            document.getElementById('student-list-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-student-name').textContent =
                currentStudent.name;
            document.getElementById('chat-student-id').textContent =
                `${currentStudent.id} • Semester ${currentStudent.semester}`;

            clearMessages();
            startPolling();
        };

        // ── Send message ───────────────────────────────────────────────
        window.sendMessage = async function() {
            const input = document.getElementById('chat-msg-input');
            const text  = input.value.trim();
            if (!text || !currentStudent) return;

            const chatKey = `${currentStudent.id}_${session.id}`;
            input.value   = '';
            input.disabled = true;

            try {
                const res = await fetch(`${CHAT_API}/${chatKey}`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ from: 'teacher', text })
                });
                if (res.ok) {
                    const msg = await res.json();
                    appendMessages([msg]);
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Failed to send: ' + (err.error || 'Unknown error'));
                    input.value = text;
                }
            } catch {
                alert('Cannot reach server. Is it running on localhost:3000?');
                input.value = text;
            }
            input.disabled = false;
            input.focus();
        };

        // ── Back button ────────────────────────────────────────────────
        window.backToStudents = function() {
            stopPolling();
            document.getElementById('chat-view').classList.add('hidden');
            document.getElementById('student-list-view').classList.remove('hidden');
            currentStudent = null;
            clearMessages();
        };
    })();
    </script>
</body>
</html>
