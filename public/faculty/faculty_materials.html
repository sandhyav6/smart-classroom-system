<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Materials - VIT</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand"><img src="../assets/logo.png" alt="VIT Logo"><h1>Vellore Institute of Technology</h1></div>
        <div class="profile-section">
            <div class="profile-info"><span class="name" id="profile-name">Faculty</span><span class="role">Faculty - Computer Science</span></div>
            <img src="../assets/faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>
    <div class="dashboard-container">
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_dashboard.html')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_attendance.html')"><i class="fas fa-calendar-alt"></i> Attendance</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_timetable.html')"><i class="fas fa-table"></i> Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_assignments.html')"><i class="fas fa-tasks"></i> Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_chat.html')"><i class="fas fa-comments"></i> Chat with Students</a>
            <a href="javascript:void(0)" class="nav-item" onclick="Nav.to('faculty_marks.html')"><i class="fas fa-chart-bar"></i> Marks & Results</a>
            <a href="#" class="nav-item active"><i class="fas fa-book"></i> Upload Materials</a>
            <a href="#" class="nav-item" style="color: #ff6b6b;" onclick="Session.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <main class="main-content" style="display: block;">
            <div class="marks-container">
                <h2><i class="fas fa-upload"></i> Upload Study Materials</h2>
                <div style="background:var(--glass-bg);border:2px solid var(--glass-border);border-radius:15px;padding:2rem;margin-top:1.5rem;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                        <div class="filter-group">
                            <label>Select Semester</label>
                            <select id="upload-sem" style="width:100%;padding:0.8rem;border:2px solid var(--glass-border);border-radius:10px;background:var(--glass-bg);color:var(--text-color);font-size:1rem;">
                                <option value="">-- Select Semester --</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Select Subject</label>
                            <select id="upload-subject" style="width:100%;padding:0.8rem;border:2px solid var(--glass-border);border-radius:10px;background:var(--glass-bg);color:var(--text-color);font-size:1rem;">
                                <option value="">-- Select Subject --</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Select Module</label>
                            <select id="upload-module" style="width:100%;padding:0.8rem;border:2px solid var(--glass-border);border-radius:10px;background:var(--glass-bg);color:var(--text-color);font-size:1rem;">
                                <option value="">-- Select Module --</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Material Type</label>
                            <select id="upload-type" style="width:100%;padding:0.8rem;border:2px solid var(--glass-border);border-radius:10px;background:var(--glass-bg);color:var(--text-color);font-size:1rem;">
                                <option value="pdf">PDF Document</option>
                                <option value="docx">Word Document</option>
                                <option value="pptx">PowerPoint</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top:1.5rem;">
                        <label style="display:block;margin-bottom:0.5rem;font-weight:600;"><i class="fas fa-file-upload"></i> Select File</label>
                        <input type="file" id="material-file"
                            style="width:100%;padding:0.8rem;border:2px solid var(--glass-border);border-radius:10px;background:var(--glass-bg);color:var(--text-color);">
                    </div>
                    <button onclick="uploadMaterial()"
                        style="margin-top:1.5rem;background:linear-gradient(135deg, #264508, #3d6b0f);color:white;border:none;padding:1rem 2rem;border-radius:12px;cursor:pointer;font-weight:700;font-size:1.1rem;">
                        <i class="fas fa-cloud-upload-alt"></i> Upload Material
                    </button>
                </div>
                <div id="upload-result" style="margin-top:1.5rem;"></div>

                <!-- My Uploaded Materials -->
                <div style="margin-top:2.5rem;">
                    <h3 style="margin-bottom:1rem;"><i class="fas fa-folder-open"></i> My Uploaded Materials</h3>
                    <div id="my-materials-list">
                        <p style="opacity:0.6;"><i class="fas fa-spinner fa-spin"></i> Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        let currentFacultyId = null;

        (async () => {
            await dataStore.ready();
            const session = await Session.requireAuth('faculty');
            if (!session) return;

            currentFacultyId = session.id;
            UIHelpers.populateHeader(session);

            const semSelect = document.getElementById('upload-sem');
            for (let i = 1; i <= 8; i++) {
                const opt = document.createElement('option');
                opt.value = `Semester ${i}`;
                opt.textContent = `Semester ${i}`;
                semSelect.appendChild(opt);
            }

            semSelect.onchange = async () => {
                const subSelect = document.getElementById('upload-subject');
                subSelect.innerHTML = '<option value="">-- Select Subject --</option>';
                const subjects = await dataStore.getMaterials(semSelect.value);
                subjects.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub; opt.textContent = sub;
                    subSelect.appendChild(opt);
                });
            };

            document.getElementById('upload-subject').onchange = async () => {
                const modSelect = document.getElementById('upload-module');
                modSelect.innerHTML = '<option value="">-- Select Module --</option>';
                const modules = await dataStore.getMaterials(semSelect.value, document.getElementById('upload-subject').value);
                modules.forEach(mod => {
                    const opt = document.createElement('option');
                    opt.value = mod; opt.textContent = mod;
                    modSelect.appendChild(opt);
                });
            };

            await loadMyMaterials();
        })();

        async function loadMyMaterials() {
            const container = document.getElementById('my-materials-list');
            if (!currentFacultyId) return;
            try {
                const res = await fetch(`/api/materials/by-faculty/${currentFacultyId}`);
                const files = await res.json();

                if (!files.length) {
                    container.innerHTML = '<p style="opacity:0.6;">No materials uploaded yet.</p>';
                    return;
                }

                const icons = { pdf: 'fa-file-pdf', docx: 'fa-file-word', doc: 'fa-file-word', pptx: 'fa-file-powerpoint', ppt: 'fa-file-powerpoint', xlsx: 'fa-file-excel', xls: 'fa-file-excel', zip: 'fa-file-archive', rar: 'fa-file-archive' };

                container.innerHTML = files.map(f => {
                    const icon = icons[f.type] || 'fa-file';
                    const size = f.fileSize ? (f.fileSize / 1024).toFixed(1) + ' KB' : '';
                    const date = f.uploadDate ? new Date(f.uploadDate).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' }) : '';
                    return `
                        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.8rem;gap:1rem;flex-wrap:wrap;">
                            <div style="display:flex;align-items:center;gap:0.9rem;flex:1;min-width:0;">
                                <i class="fas ${icon}" style="font-size:1.6rem;color:#264508;flex-shrink:0;"></i>
                                <div style="min-width:0;">
                                    <div style="font-weight:700;color:var(--text-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.name}</div>
                                    <div style="font-size:0.82rem;opacity:0.7;margin-top:0.2rem;">${f.semester} › ${f.subject} › ${f.module} &nbsp;|&nbsp; ${size} &nbsp;|&nbsp; ${date}</div>
                                </div>
                            </div>
                            <div style="display:flex;gap:0.5rem;flex-shrink:0;">
                                <a href="/api/materials/download/${f._id}" target="_blank"
                                   style="background:#264508;color:white;border:none;padding:0.5rem 0.9rem;border-radius:8px;cursor:pointer;font-size:0.9rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;">
                                    <i class="fas fa-download"></i> Download
                                </a>
                                <button onclick="deleteMaterial('${f._id}')"
                                    style="background:#ff6b6b;color:white;border:none;padding:0.5rem 0.9rem;border-radius:8px;cursor:pointer;font-size:0.9rem;">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p style="color:#ff6b6b;">Failed to load materials.</p>';
            }
        }

        async function deleteMaterial(id) {
            if (!confirm('Delete this material? This cannot be undone.')) return;
            try {
                const res = await fetch(`/api/materials/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    Toast.success('Material deleted.');
                    await loadMyMaterials();
                } else {
                    const err = await res.json().catch(() => ({}));
                    Toast.error('Delete failed: ' + (err.error || 'Unknown error'));
                }
            } catch {
                Toast.error('Could not reach server.');
            }
        }

        async function uploadMaterial() {
            const fileInput = document.getElementById('material-file');
            const sem = document.getElementById('upload-sem').value;
            const sub = document.getElementById('upload-subject').value;
            const mod = document.getElementById('upload-module').value;
            const result = document.getElementById('upload-result');

            if (!sem || !sub || !mod) { Toast.warning('Please select semester, subject, and module'); return; }
            if (!fileInput.files || fileInput.files.length === 0) { Toast.warning('Please select a file'); return; }

            result.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Uploading...</p>';

            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('semester', sem);
                formData.append('subject', sub);
                formData.append('module', mod);
                formData.append('uploadedBy', Session.get()?.id || 'faculty');

                await dataStore.uploadMaterial(formData);

                result.innerHTML = `
                    <div style="background:rgba(40,167,69,0.1);border:2px solid #28a745;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-check-circle" style="color:#28a745;font-size:1.5rem;margin-right:0.5rem;"></i>
                        <strong>Material uploaded successfully!</strong>
                        <p style="margin-top:0.5rem;">${fileInput.files[0].name} → ${sub} / ${mod}</p>
                    </div>
                `;
                Toast.success('Material uploaded to server!');
                fileInput.value = '';
                await loadMyMaterials();
            } catch (err) {
                result.innerHTML = `
                    <div style="background:rgba(220,53,69,0.1);border:2px solid #dc3545;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-exclamation-circle" style="color:#dc3545;font-size:1.5rem;margin-right:0.5rem;"></i>
                        <strong>Upload failed</strong>
                        <p style="margin-top:0.5rem;">${err.message}</p>
                    </div>
                `;
                Toast.error('Upload failed: ' + err.message);
            }
        }
    </script>
</body>

</html>
