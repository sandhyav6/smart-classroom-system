<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - VIT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="center-container">
        <div class="login-container">
            <h2>Forgot Password</h2>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Enter your registered email</label>
                    <input type="email" id="email" name="email" placeholder="e.g., arjun.sharma@vit.ac.in" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            <div id="reset-result" style="margin-top:1.5rem;"></div>
            <a href="index.html" class="btn-back" id="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Dynamic back link based on referrer
        const referrer = document.referrer;
        const backLink = document.getElementById('back-link');
        if (referrer.includes('student')) {
            backLink.href = 'student/student_login.html';
            backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Student Login';
        } else if (referrer.includes('faculty')) {
            backLink.href = 'faculty/faculty_login.html';
            backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Faculty Login';
        }

        document.getElementById('forgotForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const resultDiv = document.getElementById('reset-result');

            if (!email) {
                Toast.error('Please enter your email address');
                return;
            }

            // Show loading state
            resultDiv.innerHTML = '<p style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Sending reset link...</p>';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    resultDiv.innerHTML = `
                        <div style="background:rgba(40,167,69,0.1);border:2px solid #28a745;border-radius:12px;padding:1.5rem;">
                            <i class="fas fa-check-circle" style="color:#28a745;"></i>
                            <strong>Reset link sent!</strong>
                            <p style="margin-top:0.5rem;">A password reset link has been sent to ${email}</p>
                            <p style="font-size:0.85rem;opacity:0.7;margin-top:0.5rem;"><em>Please check your inbox and spam folder.</em></p>
                        </div>
                    `;
                    Toast.success('Password reset email sent!');
                } else {
                    resultDiv.innerHTML = `
                        <div style="background:rgba(220,53,69,0.1);border:2px solid #dc3545;border-radius:12px;padding:1.5rem;">
                            <i class="fas fa-exclamation-circle" style="color:#dc3545;"></i>
                            <strong>Email not found</strong>
                            <p style="margin-top:0.5rem;">${data.error || 'No account linked to this email.'}</p>
                        </div>
                    `;
                    Toast.error(data.error || 'Email not found in the system');
                }
            } catch (err) {
                resultDiv.innerHTML = `
                    <div style="background:rgba(220,53,69,0.1);border:2px solid #dc3545;border-radius:12px;padding:1.5rem;">
                        <i class="fas fa-exclamation-circle" style="color:#dc3545;"></i>
                        <strong>Error</strong>
                        <p style="margin-top:0.5rem;">Could not connect to server. Please try again later.</p>
                    </div>
                `;
                Toast.error('Server connection failed');
                console.error('Forgot password error:', err);
            }
        };
    </script>
</body>
</html>
