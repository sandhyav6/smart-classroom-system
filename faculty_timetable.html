<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - VIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="brand">
            <img src="logo.png" alt="VIT Logo">
            <h1>Vellore Institute of Technology</h1>
        </div>
        <div class="profile-section">
            <div class="profile-info">
                <span class="name" id="profile-name">Faculty</span>
                <span class="role">Faculty - Computer Science</span>
                <span class="blurred-password" style="filter: none; letter-spacing: 2px;">••••••</span>
            </div>
            <img src="faculty_profile.png" alt="Profile" class="profile-img">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_dashboard.html')"><i class="fas fa-home"></i>
                Dashboard</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_attendance.html')"><i
                    class="fas fa-calendar-alt"></i>
                Attendance</a>
            <a href="#" class="nav-item active" onclick="navigateTo('faculty_timetable.html')"><i
                    class="fas fa-table"></i>
                Timetable</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_assignments.html')"><i class="fas fa-tasks"></i>
                Assignments</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_chat.html')"><i class="fas fa-comments"></i> Chat
                with
                Students</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_marks.html')"><i class="fas fa-chart-bar"></i>
                Marks &
                Results</a>
            <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('faculty_materials.html')"><i class="fas fa-book"></i>
                Upload
                Materials</a>
            <a href="index.html" class="nav-item" style="color: #ff0000;"><i
                    class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <!-- Timetable View -->
        <main class="main-content" id="timetable-view" style="display: block; grid-template-columns: 1fr;">
            <div class="marks-container">
                <h2>Teaching Schedule</h2>
                <div class="timetable-grid" id="timetable-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Initialization ---
        const urlParams = new URLSearchParams(window.location.search);
        const fullname = urlParams.get('fullname') || "Dr. Priya Singh";
        document.getElementById('profile-name').innerText = fullname;

        // Navigation helper
        function navigateTo(page) {
            window.location.href = page + '?fullname=' + encodeURIComponent(fullname);
        }
        // --- Timetable Data ---
        const schedule = {
            '09:00 - 09:50': { Mon: { code: 'CSE201', name: 'Data Structures', section: 'CSE-2A', location: 'AB1-201' }, Tue: null, Wed: { code: 'CSE201', name: 'Data Structures', section: 'CSE-2A', location: 'AB1-201' }, Thu: null, Fri: { code: 'CSE201', name: 'Data Structures', section: 'CSE-2A', location: 'AB1-201' } },
            '10:00 - 10:50': { Mon: null, Tue: { code: 'CSE301', name: 'Algorithms', section: 'CSE-2B', location: 'AB1-205' }, Wed: null, Thu: { code: 'CSE301', name: 'Algorithms', section: 'CSE-2B', location: 'AB1-205' }, Fri: null },
            '11:00 - 11:50': { Mon: { code: 'CSE301', name: 'Algorithms', section: 'CSE-2B', location: 'AB1-205' }, Tue: null, Wed: { code: 'CSE301', name: 'Algorithms', section: 'CSE-2B', location: 'AB1-205' }, Thu: { code: 'CSE301', name: 'Algorithms', section: 'CSE-2B', location: 'AB1-205' }, Fri: null },
            '13:00 - 13:50': { Mon: null, Tue: null, Wed: null, Thu: null, Fri: null },
            '14:00 - 14:50': { Mon: { code: 'CSE401', name: 'Database Systems', section: 'CSE-3A', location: 'TB-304' }, Tue: null, Wed: { code: 'CSE401', name: 'Database Systems', section: 'CSE-3A', location: 'TB-304' }, Thu: null, Fri: { code: 'CSE401', name: 'Database Systems', section: 'CSE-3A', location: 'TB-304' } },
            '15:00 - 15:50': { Mon: null, Tue: { code: 'CSE401', name: 'Database Systems', section: 'CSE-3A', location: 'TB-304' }, Wed: null, Thu: { code: 'CSE401', name: 'Database Systems', section: 'CSE-3A', location: 'TB-304' }, Fri: null }
        };

        // Render Timetable
        const grid = document.getElementById('timetable-grid');
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

        // Header row
        grid.innerHTML = '<div class="timetable-header">Time</div>';
        days.forEach(day => {
            grid.innerHTML += `<div class="timetable-header">${day}</div>`;
        });

        // Time slots
        Object.entries(schedule).forEach(([time, slots]) => {
            grid.innerHTML += `<div class="timetable-time">${time}</div>`;
            days.forEach(day => {
                const classInfo = slots[day];
                if (classInfo) {
                    grid.innerHTML += `
                        <div class="timetable-cell has-class">
                            <div class="class-name">${classInfo.name}</div>
                            <div class="class-code">${classInfo.code} • ${classInfo.section}</div>
                            <div class="class-location"><i class="fas fa-map-marker-alt"></i> ${classInfo.location}</div>
                        </div>
                    `;
                } else {
                    grid.innerHTML += '<div class="timetable-cell empty">Free</div>';
                }
            });
        });
    </script>
</body>

</html>
